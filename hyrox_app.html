<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYROX Rankings Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .filter-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .filter-title {
            font-size: 1.3em;
            color: #1a1a2e;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        select, input[type="text"], input[type="number"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-search {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-reset {
            background: #666;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-reset:hover {
            background: #777;
            transform: translateY(-2px);
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ffd700;
            font-size: 1.1em;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .results-title {
            font-size: 1.5em;
            color: #1a1a2e;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #ffd700;
        }

        .race-results {
            margin-bottom: 40px;
        }

        .race-name {
            font-size: 1.2em;
            color: #ffd700;
            margin: 20px 0 15px 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        thead {
            background: #2a2a3e;
            color: #ffd700;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #ffd700;
        }

        td {
            padding: 12px;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr {
            background: white;
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        .rank {
            font-weight: 600;
            color: #ffd700;
            text-align: center;
            width: 40px;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #666;
            font-style: italic;
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border: 2px solid #ff6464;
            color: #d32f2f;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(100, 200, 100, 0.1);
            border: 2px solid #64c864;
            color: #228b22;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn-export {
            padding: 10px 20px;
            background: #2a2a3e;
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-export:hover {
            background: #ffd700;
            color: #1a1a2e;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏃 HYROX Rankings Analyzer</h1>
            <p class="subtitle">최근 대회 결과에서 특정 조건의 Top 10 랭킹 찾기</p>
        </header>

        <div class="filter-section">
            <div class="filter-title">필터 조건 설정</div>

            <div class="filter-grid">
                <div class="filter-group">
                    <label for="ageGroup">나이 그룹</label>
                    <select id="ageGroup">
                        <option value="">-- 선택 --</option>
                        <option value="U24">16-24</option>
                        <option value="25">25-29</option>
                        <option value="30">30-34</option>
                        <option value="X30">30-39</option>
                        <option value="35">35-39</option>
                        <option value="40">40-44</option>
                        <option value="X40">40-49</option>
                        <option value="45">45-49</option>
                        <option value="50">50-54</option>
                        <option value="X50">50-59</option>
                        <option value="55">55-59</option>
                        <option value="60">60-64</option>
                        <option value="65">65-69</option>
                        <option value="70">70-74</option>
                        <option value="75">75-79</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="gender">성별</label>
                    <select id="gender">
                        <option value="">-- 선택 --</option>
                        <option value="M">남자</option>
                        <option value="W">여자</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="division">카테고리</label>
                    <select id="division">
                        <option value="">-- 선택 --</option>
                        <option value="H">HYROX (싱글)</option>
                        <option value="HD">HYROX DOUBLES</option>
                        <option value="HE">HYROX ELITE</option>
                        <option value="HDE">HYROX ELITE DOUBLES</option>
                        <option value="HMR">HYROX TEAM RELAY</option>
                        <option value="HA">HYROX ADAPTIVE</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="topN">Top N 추출</label>
                    <input type="number" id="topN" value="10" min="1" max="50">
                </div>

                <div class="filter-group">
                    <label for="numRaces">최근 대회 수</label>
                    <input type="number" id="numRaces" value="10" min="1" max="30">
                </div>
            </div>

            <div class="button-group">
                <button class="btn-search" onclick="searchRankings()">🔍 검색 시작</button>
                <button class="btn-reset" onclick="resetFilters()">초기화</button>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-container">
                <div class="loading" id="loadingDiv" style="display: none;">
                    <span class="loading-spinner"></span>
                    데이터를 수집 중입니다...
                </div>

                <div id="messageDiv"></div>

                <div id="resultsContent" style="display: none;">
                    <div class="results-title">📊 검색 결과</div>

                    <div class="stats-summary" id="statsSummary"></div>

                    <div class="export-buttons">
                        <button class="btn-export" onclick="exportToCSV()">📥 CSV로 다운로드</button>
                        <button class="btn-export" onclick="printResults()">🖨️ 인쇄</button>
                    </div>

                    <div id="resultsTable"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hyrox 데이터 소스
        const HYROX_RACES_2025 = [
            { name: "2025 Stockholm", value: "2025 Stockholm" },
            { name: "2025 Shenzhen", value: "2025 Shenzhen" },
            { name: "2025 Vancouver", value: "2025 Vancouver" },
            { name: "2025 Anaheim", value: "2025 Anaheim" },
            { name: "2025 Frankfurt", value: "2025 Frankfurt" },
            { name: "2025 Melbourne", value: "2025 Melbourne" },
            { name: "2025 Gent", value: "2025 Gent" },
            { name: "2025 Poznan", value: "2025 Poznan" },
            { name: "2025 London Excel", value: "2025 London Excel" },
            { name: "2025 Verona", value: "2025 Verona" },
        ];

        function searchRankings() {
            const ageGroup = document.getElementById('ageGroup').value;
            const gender = document.getElementById('gender').value;
            const division = document.getElementById('division').value;
            const topN = parseInt(document.getElementById('topN').value);
            const numRaces = parseInt(document.getElementById('numRaces').value);

            // 검증
            if (!ageGroup || !gender || !division) {
                showMessage('나이 그룹, 성별, 카테고리를 모두 선택해주세요.', 'error');
                return;
            }

            // UI 업데이트
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('loadingDiv').style.display = 'block';
            document.getElementById('resultsContent').style.display = 'none';
            document.getElementById('messageDiv').innerHTML = '';

            // 실제로는 백엔드 API를 호출하거나 웹스크래핑을 해야 하지만,
            // 이 데모에서는 샘플 데이터를 생성합니다.
            setTimeout(() => {
                const results = generateSampleResults(ageGroup, gender, division, topN, numRaces);
                displayResults(results, ageGroup, gender, division, topN);
            }, 1500);
        }

        function generateSampleResults(ageGroup, gender, division, topN, numRaces) {
            const results = {};
            const races = HYROX_RACES_2025.slice(0, numRaces);

            races.forEach((race, idx) => {
                results[race.name] = [];
                for (let i = 1; i <= topN; i++) {
                    results[race.name].push({
                        rank: i,
                        firstName: `Runner${i}`,
                        lastName: `Lastname${i}`,
                        time: `${50 + idx + (i-1)*0.5}:${20 + (i*2)%60}:${(i*7)%60}`,
                        division: division === 'H' ? 'HYROX' : 'HYROX ' + division,
                        ageGroup: getAgeGroupLabel(ageGroup),
                        gender: gender === 'M' ? 'Male' : 'Female',
                        nationality: ['KOR', 'GER', 'USA', 'GBR', 'FRA', 'AUS', 'CAN', 'JPN', 'CHN', 'IND'][i % 10]
                    });
                }
            });

            return results;
        }

        function getAgeGroupLabel(code) {
            const labels = {
                'U24': '16-24',
                '25': '25-29',
                '30': '30-34',
                'X30': '30-39',
                '35': '35-39',
                '40': '40-44',
                'X40': '40-49',
                '45': '45-49',
                '50': '50-54',
                'X50': '50-59',
                '55': '55-59',
                '60': '60-64',
                '65': '65-69',
                '70': '70-74',
                '75': '75-79'
            };
            return labels[code] || code;
        }

        function displayResults(results, ageGroup, gender, division, topN) {
            document.getElementById('loadingDiv').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'block';

            const races = Object.keys(results);
            const totalParticipants = races.length * topN;
            const totalRaces = races.length;

            // 통계 표시
            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalRaces}</div>
                    <div class="stat-label">대회</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalParticipants}</div>
                    <div class="stat-label">총 선수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${getAgeGroupLabel(ageGroup)}</div>
                    <div class="stat-label">나이그룹</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${gender === 'M' ? '남자' : '여자'}</div>
                    <div class="stat-label">성별</div>
                </div>
            `;

            // 결과 테이블 생성
            let html = '';
            races.forEach(raceName => {
                const raceData = results[raceName];
                html += `
                    <div class="race-results">
                        <div class="race-name">${raceName}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 50px;">순위</th>
                                    <th>이름</th>
                                    <th>국가</th>
                                    <th>시간</th>
                                    <th>나이</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                raceData.forEach(runner => {
                    html += `
                        <tr>
                            <td class="rank">${runner.rank}</td>
                            <td>${runner.firstName} ${runner.lastName}</td>
                            <td>${runner.nationality}</td>
                            <td>${runner.time}</td>
                            <td>${runner.ageGroup}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });

            document.getElementById('resultsTable').innerHTML = html;
            showMessage(`✅ 검색 완료! ${totalRaces}개 대회에서 총 ${totalParticipants}명의 선수 데이터를 수집했습니다.`, 'success');
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('messageDiv');
            msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
        }

        function resetFilters() {
            document.getElementById('ageGroup').value = '';
            document.getElementById('gender').value = '';
            document.getElementById('division').value = '';
            document.getElementById('topN').value = '10';
            document.getElementById('numRaces').value = '10';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('messageDiv').innerHTML = '';
        }

        function exportToCSV() {
            const tables = document.querySelectorAll('table');
            let csv = '대회,순위,이름,국가,시간,나이\n';

            const raceName = document.querySelectorAll('.race-name');
            let raceIdx = 0;

            tables.forEach(table => {
                const currentRace = raceName[raceIdx]?.innerText || 'Unknown';
                const rows = table.querySelectorAll('tbody tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    const rank = cells[0].innerText;
                    const name = cells[1].innerText;
                    const country = cells[2].innerText;
                    const time = cells[3].innerText;
                    const age = cells[4].innerText;
                    csv += `"${currentRace}",${rank},"${name}",${country},${time},${age}\n`;
                });
                raceIdx++;
            });

            downloadCSV(csv, 'hyrox_rankings.csv');
        }

        function downloadCSV(csv, filename) {
            const link = document.createElement('a');
            link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
            link.download = filename;
            link.click();
        }

        function printResults() {
            window.print();
        }

        // 페이지 로드 시
        window.addEventListener('load', () => {
            document.getElementById('ageGroup').value = '50'; // 기본값 설정
        });
    </script>
</body>
</html>
